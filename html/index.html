<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Site de Waifus</title>

</head>
<body>
    <h1>Site de waifus!</h1>
    <h2>Irei listar todas aqui</h2>

    <button class="btn-add" onclick="abrirModal()">+ Adicionar Waifu</button>

    <div class="modal-overlay" id="modalOverlay" onclick="fecharModalFora(event)">
  <div class="modal">
    <h3 id ="modalTitulo">Nova Waifu</h3>

    <label>Nome:</label>
    <input type="text" id="inputNome" placeholder="Ex: Tomoyo">

    <label>Imagem:</label>
    <button type="button" id="btnEscolherImg" onclick="escolherImagem()">📁 Escolher imagem</button>
    <p id="nomeImagem" style="color:#f0f0ff; font-size:0.8rem; margin:0;">Nenhuma imagem escolhida</p>
    <input type="hidden" id="inputImg">

    <label>Características:</label>
    <textarea id="inputTraits" rows="4" placeholder="Ex: Corajosa, misteriosa..."></textarea>

    <div class="modal-actions">
      <button onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirmar" id="btnConfirmar" onclick="salvarWaifu()">Adicionar</button>
    </div>
  </div>
</div>
