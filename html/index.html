<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waifus RPG</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- BOTÃO DE ABRIR/FECHAR MENU -->
     <!-- BOTÃO PARA REABRIR (aparece quando menu está fechado) -->
    <button class="btn-reabrir-menu" id="btnReabrirMenu" onclick="toggleMenu()" style="display:none;">☰</button>

    <!-- MENU LATERAL -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Personagens</h2>
            <div style="display: flex; gap: 8px;">
                <button class="btn-novo-personagem" onclick="abrirModalPersonagem()">+ Novo</button>
                <!-- BOTÃO DE ABRIR/FECHAR MENU dentro da Sidebar -->
                 <button class="btn-fechar-menu" onclick="toggleMenu()">X</button>
            </div>
        </div>
        <ul class="lista-personagens" id="listaPersonagens"></ul>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="conteudo" id="conteudo">
        <div class="topo">
            <div id="infoPersonagem" class="info-personagem-topo" style="display:none;">
                <img id="avatarTopo" src="" alt="">
                <div>
                    <h1 id="nomeTopo"></h1>
                    <p id="bioTopo"></p>
                </div>
                <div class="acoes-personagem">
                    <button class="btn-editar-p" onclick="editarPersonagemAtual()">✏ Editar</button>
                    <button class="btn-excluir-p" onclick="excluirPersonagemAtual()">✕ Excluir</button>
                </div>
            </div>
            <div id="semPersonagem" class="sem-personagem">
                <p>👈 Selecione ou crie um personagem para começar</p>
            </div>
        </div>

        <button class="btn-add" id="btnAdicionarWaifu" style="display:none;" onclick="abrirModalWaifu()">+ Adicionar Waifu</button>
        <div class="cards-container" id="cardsContainer"></div>
    </main>

    <!-- MODAL PERSONAGEM -->
    <div class="modal-overlay" id="modalPersonagemOverlay" onclick="fecharModalPersonagemFora(event)">
        <div class="modal">
            <h3 id="modalPersonagemTitulo">Novo Personagem</h3>
            <label>Nome:</label>
            <input type="text" id="inputNomePersonagem" placeholder="Ex: Arthur Blackwood">
            <label>Avatar:</label>
            <button type="button" id="btnEscolherAvatar" onclick="escolherAvatar()">📁 Escolher avatar</button>
            <p id="nomeAvatar" style="color:#f0d0ff;font-size:0.8rem;margin:0;">Nenhuma imagem escolhida</p>
            <input type="hidden" id="inputAvatar">
            <label>Bio:</label>
            <textarea id="inputBio" rows="3" placeholder="Descrição do personagem..."></textarea>
            <div class="modal-actions">
                <button onclick="fecharModalPersonagem()">Cancelar</button>
                <button class="btn-confirmar" id="btnConfirmarPersonagem" onclick="salvarPersonagem()">Criar</button>
            </div>
        </div>
    </div>

    <!-- MODAL WAIFU -->
    <div class="modal-overlay" id="modalWaifuOverlay" onclick="fecharModalWaifuFora(event)">
        <div class="modal">
            <h3 id="modalWaifuTitulo">Nova Waifu</h3>
            <label>Nome:</label>
            <input type="text" id="inputNome" placeholder="Ex: Tomoyo">
            <label>Imagem:</label>
            <button type="button" id="btnEscolherImg" onclick="escolherImagem()">📁 Escolher imagem</button>
            <p id="nomeImagem" style="color:#f0d0ff;font-size:0.8rem;margin:0;">Nenhuma imagem escolhida</p>
            <input type="hidden" id="inputImg">
            <label>Características:</label>
            <textarea id="inputTraits" rows="4" placeholder="Ex: Corajosa, misteriosa..."></textarea>
            <div class="modal-actions">
                <button onclick="fecharModalWaifu()">Cancelar</button>
                <button class="btn-confirmar" id="btnConfirmarWaifu" onclick="salvarWaifu()">Adicionar</button>
            </div>
        </div>
    </div>

    <!-- MODAL FICHA DA WAIFU -->
    <div class="modal-overlay" id="modalFichaOverlay" onclick="fecharFichaFora(event)">
        <div class="modal modal-ficha">
            <div class="ficha-header">
                <img id="fichaImg" src="" alt="" class="ficha-avatar">
                <div class="ficha-header-info">
                    <h2 id="fichaNome" contenteditable="true" class="editavel" title="Clique para editar"></h2>
                    <div class="ficha-nivel">
                        <span>Nível</span>
                        <input type="number" id="fichaNivel" min="1" max="999" value="1">
                    </div>
                </div>
                <button class="btn-fechar-ficha" onclick="fecharFicha()">✕</button>
            </div>

            <div class="ficha-corpo">

                <!-- IDENTIDADE -->
                <div class="ficha-secao">
                    <h4 class="ficha-secao-titulo">⚔ Identidade</h4>
                    <div class="ficha-grid-3">
                        <div class="ficha-campo">
                            <label>Classe / Profissão</label>
                            <input type="text" id="fichaClasse" placeholder="Ex: Guerreira">
                        </div>
                        <div class="ficha-campo">
                            <label>Raça</label>
                            <input type="text" id="fichaRaca" placeholder="Ex: Elfa">
                        </div>
                        <div class="ficha-campo">
                            <label>Origem</label>
                            <input type="text" id="fichaOrigem" placeholder="Ex: Reino do Norte">
                        </div>
                    </div>
                </div>

                <!-- ATRIBUTOS -->
                <div class="ficha-secao">
                    <h4 class="ficha-secao-titulo">✦ Atributos</h4>
                    <div class="ficha-grid-4">
                        <div class="ficha-atributo">
                            <label>Força</label>
                            <input type="number" id="fichaForca" min="0" max="999" value="10">
                        </div>
                        <div class="ficha-atributo">
                            <label>Agilidade</label>
                            <input type="number" id="fichaAgilidade" min="0" max="999" value="10">
                        </div>
                        <div class="ficha-atributo">
                            <label>Inteligência</label>
                            <input type="number" id="fichaInteligencia" min="0" max="999" value="10">
                        </div>
                        <div class="ficha-atributo">
                            <label>Carisma</label>
                            <input type="number" id="fichaCarisma" min="0" max="999" value="10">
                        </div>
                    </div>
                </div>

                <!-- HABILIDADES -->
                <div class="ficha-secao">
                    <h4 class="ficha-secao-titulo">🌟 Habilidades</h4>
                    <div id="listaHabilidades" class="lista-habilidades"></div>
                    <button class="btn-add-habilidade" onclick="adicionarHabilidade()">+ Adicionar habilidade</button>
                </div>

                <!-- DESCRIÇÃO -->
                <div class="ficha-secao">
                    <h4 class="ficha-secao-titulo">📖 Descrição</h4>
                    <textarea id="fichaDescricao" rows="4" placeholder="História, personalidade, segredos..."></textarea>
                </div>

            </div>

            <div class="ficha-footer">
                <button class="btn-fechar-ficha-baixo" onclick="fecharFicha()">Fechar</button>
                <button class="btn-salvar-ficha" onclick="salvarFicha()">💾 Salvar Ficha</button>
            </div>
        </div>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
