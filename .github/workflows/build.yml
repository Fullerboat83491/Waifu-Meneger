name: Build Waifus RPG

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar executável Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: executavel-windows
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar executável Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: executavel-linux
          path: dist/*.AppImage

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      # O macOS tem o comando iconutil nativo que gera o .icns corretamente.
      # O icon.iconset já está no repositório (pasta build/icon.iconset)
      # com os PNGs nos tamanhos certos — o step abaixo converte para .icns.
      - name: Gerar icon.icns nativo
        run: iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Gerar executável Mac
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: executavel-mac
          path: dist/*.dmg