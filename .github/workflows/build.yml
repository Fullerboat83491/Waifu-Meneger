name: Build Waifus RPG

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar executável Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: executavel-windows
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar executável Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: executavel-linux
          path: dist/*.AppImage

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      # Gera o iconset a partir do icon.png e converte para .icns com iconutil nativo do macOS
      - name: Gerar icon.icns nativo
        run: |
          mkdir -p build/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size build/icon.png --out build/icon.iconset/icon_${size}x${size}.png
          done
          sips -z 32  32  build/icon.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 64  64  build/icon.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 256 256 build/icon.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 512 512 build/icon.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 build/icon.png --out build/icon.iconset/icon_512x512.png
          cp build/icon.png build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Gerar executável Mac
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: executavel-mac
          path: dist/*.dmg