name: Build Waifus RPG

on:
  push:
    branches: [ main ]
  workflow_dispatch: # permite rodar manualmente pelo site do GitHub

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar executável Windows
        run: npm run build:win

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: executavel-windows
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar executável Linux
        run: npm run build:linux

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: executavel-linux
          path: dist/*.AppImage

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar executável Mac
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # desativa assinatura de código

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: executavel-mac
          path: dist/*.dmg